{% extends 'base.html' %}
{% block content %}
<h2>{% if form.instance.pk %}Редактирование{% else %}Новая зона оператора{% endif %}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a href="{% url 'operatorzone_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}

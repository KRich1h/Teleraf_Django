{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-11">
        <div class="card shadow-sm">
            <div class="card-header bg-white py-2 d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Создание телеграммы</h5>
                <button type="button" class="btn btn-sm btn-outline-danger" id="clearAllDataBtn">
                    <i class="bi bi-trash"></i> Очистить всё
                </button>
            </div>
            <div class="card-body">
                <form method="post" id="telegramForm">
                    {% csrf_token %}

                    <!-- Текст -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Текст телеграммы</label>
                        <textarea name="text" id="telegramText" class="form-control" rows="6" required placeholder="Введите текст..."></textarea>
                        <div class="form-text mt-1">
                            <button type="button" class="btn btn-sm btn-outline-secondary" id="uploadWordBtn">
                                <i class="bi bi-file-word"></i> Загрузить из Word
                            </button>
                            <input type="file" id="wordFile" accept=".docx" style="display: none;">
                        </div>
                    </div>

                    <!-- Черновик -->
                    <div class="mb-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="isDraft" name="is_draft" checked>
                            <label class="form-check-label" for="isDraft">Сохранить как черновик</label>
                            <div class="form-text text-muted small">Если снять, после создания телеграмма пойдёт на согласование/подпись/доставку</div>
                        </div>
                    </div>

                    <!-- 1. Получатели -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Получатели</label>
                        <div class="row g-2">
                            <div class="col-md-6">
                                <div class="border rounded p-2 bg-light" style="height: 340px; display: flex; flex-direction: column;">
                                    <input type="text" id="searchDept_recipient" class="form-control form-control-sm mb-2" placeholder="Поиск подразделения...">
                                    <div id="availableTree_recipient" style="overflow-y: auto; flex-grow: 1;" class="small"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="border rounded p-2 bg-light" style="height: 340px; display: flex; flex-direction: column;">
                                    <div id="selectedTree_recipient" style="overflow-y: auto; flex-grow: 1;"></div>
                                    <button type="button" class="btn btn-sm btn-outline-danger mt-2 clear-all" data-type="recipient">Очистить всех</button>
                                </div>
                            </div>
                        </div>
                        <input type="hidden" name="recipients" id="recipientsHidden">
                    </div>

                    <!-- 2. Согласование -->
                    <div class="mb-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="requiresApproval" name="requires_approval">
                            <label class="form-check-label" for="requiresApproval">Требуется согласование (можно выбрать несколько)</label>
                        </div>
                        <div id="approversGroup" style="display: none;">
                            <div class="row g-2">
                                <div class="col-md-6">
                                    <div class="border rounded p-2 bg-light" style="height: 300px; display: flex; flex-direction: column;">
                                        <input type="text" id="searchDept_approver" class="form-control form-control-sm mb-2" placeholder="Поиск подразделения...">
                                        <div id="availableTree_approver" style="overflow-y: auto; flex-grow: 1;"></div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="border rounded p-2 bg-light" style="height: 300px; display: flex; flex-direction: column;">
                                        <div id="selectedTree_approver" style="overflow-y: auto; flex-grow: 1;"></div>
                                        <button type="button" class="btn btn-sm btn-outline-danger mt-2 clear-all" data-type="approver">Очистить всех</button>
                                    </div>
                                </div>
                            </div>
                            <input type="hidden" name="approvers" id="approversHidden">
                        </div>
                    </div>

                    <!-- 3. Подпись -->
                    <div class="mb-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="requiresSignature" name="requires_signature">
                            <label class="form-check-label" for="requiresSignature">Требуется подпись (выберите одного)</label>
                        </div>
                        <div id="signerGroup" style="display: none;">
                            <div class="row g-2">
                                <div class="col-md-6">
                                    <div class="border rounded p-2 bg-light" style="height: 300px; display: flex; flex-direction: column;">
                                        <input type="text" id="searchDept_signer" class="form-control form-control-sm mb-2" placeholder="Поиск подразделения...">
                                        <div id="availableTree_signer" style="overflow-y: auto; flex-grow: 1;"></div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="border rounded p-2 bg-light" style="height: 300px; display: flex; flex-direction: column;">
                                        <div id="selectedTree_signer" style="overflow-y: auto; flex-grow: 1;"></div>
                                        <button type="button" class="btn btn-sm btn-outline-danger mt-2 clear-all" data-type="signer">Очистить</button>
                                    </div>
                                </div>
                            </div>
                            <input type="hidden" name="signer" id="signerHidden">
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Создать</button>
                        <a href="{% url 'telegram_journal' %}" class="btn btn-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // ====================== ОБЩАЯ ЛОГИКА ДЛЯ ДЕРЕВЬЕВ ======================
    const typeConfig = {
        recipient: { api: '/api/departments-with-users/', multiple: true, title: 'получателей' },
        approver: { api: '/api/approvers-tree/', multiple: true, title: 'согласующих' },
        signer:   { api: '/api/approvers-tree/', multiple: false, title: 'подписанта' }
    };

    let selectedData = { recipient: {}, approver: {}, signer: null };

    // Сохранение / загрузка localStorage
    function save(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
    function load(key) { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : null; }

    // Сохранение текста телеграммы
    const textarea = document.getElementById('telegramText');
    if (load('telegramText')) textarea.value = load('telegramText');
    textarea.addEventListener('input', () => save('telegramText', textarea.value));

    // Очистка всех данных (включая текст)
    document.getElementById('clearAllDataBtn').addEventListener('click', () => {
        if (confirm('Очистить все выбранные данные?')) {
            localStorage.clear();
            location.reload();
        }
    });

    // Чекбоксы "Требуется согласование/подпись"
    const requiresApproval = document.getElementById('requiresApproval');
    const requiresSignature = document.getElementById('requiresSignature');
    const approversGroup = document.getElementById('approversGroup');
    const signerGroup = document.getElementById('signerGroup');
    if (load('requiresApprovalChecked')) requiresApproval.checked = true;
    if (load('requiresSignatureChecked')) requiresSignature.checked = true;
    approversGroup.style.display = requiresApproval.checked ? 'block' : 'none';
    signerGroup.style.display = requiresSignature.checked ? 'block' : 'none';
    requiresApproval.addEventListener('change', () => {
        approversGroup.style.display = requiresApproval.checked ? 'block' : 'none';
        save('requiresApprovalChecked', requiresApproval.checked);
    });
    requiresSignature.addEventListener('change', () => {
        signerGroup.style.display = requiresSignature.checked ? 'block' : 'none';
        save('requiresSignatureChecked', requiresSignature.checked);
    });

    // Чекбокс черновика
    const isDraftCheck = document.getElementById('isDraft');
    if (load('isDraftChecked') !== null) isDraftCheck.checked = load('isDraftChecked');
    isDraftCheck.addEventListener('change', () => save('isDraftChecked', isDraftCheck.checked));

    // Загрузка и отрисовка дерева
    async function loadTree(type) {
        const cfg = typeConfig[type];
        try {
            const res = await fetch(cfg.api);
            const data = await res.json();
            const departments = data.map(dept => ({
                id: dept.id,
                name: dept.name,
                users: (dept.users || []).map(u => ({ id: u.id, name: u.position_name || u.full_name || u.username }))
            }));
            renderTree(type, departments);
            // восстановить выбранных
            const saved = load(`selected_${type}`);
            if (saved) restoreSelected(type, saved);
        } catch(e) {
            document.getElementById(`availableTree_${type}`).innerHTML = '<div class="text-danger">Ошибка загрузки</div>';
        }
    }

    function renderTree(type, departments) {
        const container = document.getElementById(`availableTree_${type}`);
        if (!departments.length) { container.innerHTML = '<div class="text-muted small">Нет подразделений</div>'; return; }
        let html = '';
        departments.forEach((dept, idx) => {
            const collapseId = `${type}Collapse${idx}_${dept.id}`;
            html += `
                <div class="mb-2 border-bottom pb-1">
                    <div class="d-flex justify-content-between align-items-center" style="cursor: pointer;" data-bs-toggle="collapse" data-bs-target="#${collapseId}">
                        <strong class="small">${escapeHtml(dept.name)}</strong><i class="bi bi-chevron-down toggle-icon"></i>
                    </div>
                    <div class="collapse mt-1" id="${collapseId}">
                        <div class="ms-2">
                            <button type="button" class="btn btn-sm btn-link p-0 mb-1 add-all-dept" data-type="${type}" data-dept-id="${dept.id}" data-dept-name="${escapeHtml(dept.name)}">+ Добавить всех</button>
                            <div>
                                ${dept.users.map(u => `
                                    <div class="form-check">
                                        <input class="form-check-input ${type}-cb" type="${typeConfig[type].multiple ? 'checkbox' : 'radio'}" name="${type}Radio" value="${u.id}" data-name="${escapeHtml(u.name)}" data-dept-id="${dept.id}" data-dept-name="${escapeHtml(dept.name)}" id="${type}_${u.id}">
                                        <label for="${type}_${u.id}">${escapeHtml(u.name)}</label>
                                    </div>
                                `).join('') || '<div class="text-muted">Нет сотрудников</div>'}
                            </div>
                        </div>
                    </div>
                </div>`;
        });
        container.innerHTML = html;

        // аккордеоны
        document.querySelectorAll(`#availableTree_${type} [data-bs-toggle="collapse"]`).forEach(header => {
            header.addEventListener('click', function() {
                const icon = this.querySelector('.toggle-icon');
                if (icon) icon.classList.toggle('bi-chevron-down'), icon.classList.toggle('bi-chevron-up');
            });
        });
        // кнопки "Добавить всех"
        document.querySelectorAll(`#availableTree_${type} .add-all-dept`).forEach(btn => {
            btn.addEventListener('click', () => addAllFromDept(btn.dataset.type, +btn.dataset.deptId, btn.dataset.deptName));
        });
        // чекбоксы / радиокнопки
        document.querySelectorAll(`.${type}-cb`).forEach(cb => {
            cb.addEventListener('change', () => handleUserSelect(type, cb));
        });
        syncCheckboxes(type);
    }

    function addAllFromDept(type, deptId, deptName) {
        document.querySelectorAll(`.${type}-cb`).forEach(cb => {
            if (+cb.dataset.deptId === deptId && !cb.checked) {
                cb.checked = true;
                handleUserSelect(type, cb);
            }
        });
    }

    function handleUserSelect(type, cb) {
        const cfg = typeConfig[type];
        const userId = +cb.value;
        const userName = cb.dataset.name;
        const deptId = +cb.dataset.deptId;
        const deptName = cb.dataset.deptName;

        if (cfg.multiple) {
            if (cb.checked) {
                if (!selectedData[type][deptId]) selectedData[type][deptId] = { deptName, users: {} };
                selectedData[type][deptId].users[userId] = userName;
            } else {
                if (selectedData[type][deptId] && selectedData[type][deptId].users[userId]) {
                    delete selectedData[type][deptId].users[userId];
                    if (Object.keys(selectedData[type][deptId].users).length === 0) delete selectedData[type][deptId];
                }
            }
        } else {
            if (cb.checked) {
                selectedData[type] = { userId, userName, deptId, deptName };
                document.querySelectorAll(`.${type}-cb`).forEach(other => { if (other !== cb) other.checked = false; });
            } else {
                selectedData[type] = null;
            }
        }
        renderSelectedTree(type);
        save(`selected_${type}`, type === 'signer' ? selectedData[type] : selectedData[type]);
        updateHiddenField(type);
        syncCheckboxes(type);
    }

    function renderSelectedTree(type) {
        const container = document.getElementById(`selectedTree_${type}`);
        const cfg = typeConfig[type];
        const selected = selectedData[type];

        if ((cfg.multiple && Object.keys(selected).length === 0) || (!cfg.multiple && !selected)) {
            container.innerHTML = `<div class="text-muted small">Нет выбранных ${cfg.title}</div>`;
            return;
        }

        if (cfg.multiple) {
            let html = '';
            for (let deptId in selected) {
                const dept = selected[deptId];
                html += `<div class="mb-2 border-bottom pb-1">
                            <div class="d-flex justify-content-between" style="cursor:pointer;" data-bs-toggle="collapse" data-bs-target="#sel${type}Coll${deptId}">
                                <strong>${escapeHtml(dept.deptName)}</strong><i class="bi bi-chevron-down toggle-icon"></i>
                            </div>
                            <div class="collapse mt-1" id="sel${type}Coll${deptId}">
                                <button class="btn btn-sm btn-link p-0 remove-dept" data-type="${type}" data-dept-id="${deptId}">Удалить всех</button>
                                <div>${Object.entries(dept.users).map(([uid, name]) => `<div class="d-flex justify-content-between"><span>${escapeHtml(name)}</span><button class="btn btn-sm btn-outline-danger py-0 px-1 remove-user" data-type="${type}" data-user-id="${uid}" data-dept-id="${deptId}">&times;</button></div>`).join('')}</div>
                            </div>
                         </div>`;
            }
            container.innerHTML = html;
            // обработчики удаления
            document.querySelectorAll(`#selectedTree_${type} .remove-dept`).forEach(btn => btn.addEventListener('click', () => {
                delete selectedData[type][+btn.dataset.deptId];
                renderSelectedTree(type);
                save(`selected_${type}`, selectedData[type]);
                syncCheckboxes(type);
                updateHiddenField(type);
            }));
            document.querySelectorAll(`#selectedTree_${type} .remove-user`).forEach(btn => btn.addEventListener('click', (e) => {
                const userId = +btn.dataset.userId, deptId = +btn.dataset.deptId;
                if (selectedData[type][deptId] && selectedData[type][deptId].users[userId]) {
                    delete selectedData[type][deptId].users[userId];
                    if (Object.keys(selectedData[type][deptId].users).length === 0) delete selectedData[type][deptId];
                }
                renderSelectedTree(type);
                save(`selected_${type}`, selectedData[type]);
                syncCheckboxes(type);
                updateHiddenField(type);
                e.stopPropagation();
            }));
            document.querySelectorAll(`#selectedTree_${type} [data-bs-toggle="collapse"]`).forEach(h => h.addEventListener('click', function() {
                const icon = this.querySelector('.toggle-icon');
                if (icon) icon.classList.toggle('bi-chevron-down'), icon.classList.toggle('bi-chevron-up');
            }));
        } else {
            container.innerHTML = `<div class="border p-2 rounded"><strong>${escapeHtml(selected.deptName)}</strong><br>${escapeHtml(selected.userName)}</div>`;
        }
    }

    function updateHiddenField(type) {
        const selected = selectedData[type];
        if (type === 'recipient') {
            let ids = [];
            for (let d in selected) ids.push(...Object.keys(selected[d].users).map(Number));
            document.getElementById('recipientsHidden').value = ids.join(',');
        } else if (type === 'approver') {
            let ids = [];
            for (let d in selected) ids.push(...Object.keys(selected[d].users).map(Number));
            document.getElementById('approversHidden').value = ids.join(',');
        } else if (type === 'signer') {
            document.getElementById('signerHidden').value = selected ? selected.userId : '';
        }
    }

    function syncCheckboxes(type) {
        const selected = selectedData[type];
        document.querySelectorAll(`.${type}-cb`).forEach(cb => {
            const uid = +cb.value;
            const deptId = +cb.dataset.deptId;
            if (type === 'signer') {
                cb.checked = (selected && selected.userId === uid);
            } else {
                cb.checked = !!(selected[deptId] && selected[deptId].users[uid]);
            }
        });
    }

    function restoreSelected(type, saved) {
        if (type === 'signer') {
            selectedData[type] = saved;
        } else {
            selectedData[type] = saved || {};
        }
        renderSelectedTree(type);
        syncCheckboxes(type);
        updateHiddenField(type);
    }

    // Поиск по подразделениям для каждого типа
    function setupSearch(type) {
        const input = document.getElementById(`searchDept_${type}`);
        if (!input) return;
        input.addEventListener('input', (e) => {
            clearTimeout(window[`searchTimeout_${type}`]);
            window[`searchTimeout_${type}`] = setTimeout(() => {
                const filter = e.target.value.toLowerCase();
                const container = document.getElementById(`availableTree_${type}`);
                const allDivs = container.querySelectorAll('.mb-2.border-bottom');
                allDivs.forEach(div => {
                    const titleDiv = div.querySelector('.d-flex strong');
                    const deptName = titleDiv ? titleDiv.innerText.toLowerCase() : '';
                    if (deptName.includes(filter)) div.style.display = '';
                    else div.style.display = 'none';
                });
            }, 300);
        });
    }

    // Кнопки "Очистить всех"
    document.querySelectorAll('.clear-all').forEach(btn => {
        btn.addEventListener('click', () => {
            const type = btn.dataset.type;
            if (type === 'signer') selectedData[type] = null;
            else selectedData[type] = {};
            renderSelectedTree(type);
            save(`selected_${type}`, selectedData[type]);
            syncCheckboxes(type);
            updateHiddenField(type);
        });
    });

    // Загрузка Word
    document.getElementById('uploadWordBtn').addEventListener('click', () => document.getElementById('wordFile').click());
    document.getElementById('wordFile').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const fd = new FormData();
        fd.append('file', file);
        try {
            const resp = await fetch("{% url 'upload_word' %}", { method: 'POST', body: fd, headers: { 'X-CSRFToken': '{{ csrf_token }}' } });
            const data = await resp.json();
            if (data.error) alert(data.error);
            else document.getElementById('telegramText').value = data.text;
        } catch(err) { alert('Ошибка загрузки'); }
        e.target.value = '';
    });

    // Валидация формы
    document.getElementById('telegramForm').addEventListener('submit', (e) => {
        if (!document.getElementById('recipientsHidden').value) {
            e.preventDefault();
            alert('Выберите хотя бы одного получателя');
            return;
        }
        if (requiresApproval.checked && !document.getElementById('approversHidden').value) {
            e.preventDefault();
            alert('Выберите хотя бы одного согласующего');
            return;
        }
        if (requiresSignature.checked && !document.getElementById('signerHidden').value) {
            e.preventDefault();
            alert('Выберите подписанта');
            return;
        }
        // При желании можно очистить текст из localStorage после отправки (закомментировано):
        // save('telegramText', '');
    });

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    // Инициализация
    loadTree('recipient');
    loadTree('approver');
    loadTree('signer');
    setupSearch('recipient');
    setupSearch('approver');
    setupSearch('signer');
</script>
{% endblock %}

{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="h4 mb-0"><i class="bi bi-building"></i> Подразделения</h2>
    {% if request.user.role == 'ADMIN' %}
        <a href="{% url 'department_create' %}" class="btn btn-sm btn-primary"><i class="bi bi-plus"></i> Добавить</a>
    {% endif %}
</div>
<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Код</th>
                        <th>Наименование</th>
                    </tr>
                </thead>
                <tbody>
                    {% for dept in departments %}
                    <tr>
                        <td>{{ dept.code }}</td>
                        <td><a href="{% url 'department_users' dept.id %}">{{ dept.name }}</a></td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="2">Нет подразделений.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
